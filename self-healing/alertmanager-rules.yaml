apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: self-healing-alerts
  namespace: monitoring
  labels:
    # This label is required for kube-prometheus-stack to pick up the rules
    release: prometheus
spec:
  groups:
    - name: pod-health
      rules:
        # Alert when a pod is in CrashLoopBackOff
        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total[5m]) > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash looping"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted {{ $value }} times in the last 5 minutes."

        # Alert when a pod is not ready
        - alert: PodNotReady
          expr: kube_pod_status_ready{condition="true"} == 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} is not ready"
            description: "Pod {{ $labels.pod }} has been not ready for more than 2 minutes."

        # Alert when deployment has fewer available replicas than desired
        - alert: DeploymentReplicasMismatch
          expr: kube_deployment_spec_replicas != kube_deployment_status_available_replicas
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Deployment {{ $labels.deployment }} replica mismatch"
            description: "Deployment {{ $labels.deployment }} has {{ $value }} available replicas but desired more."

    - name: app-performance
      rules:
        # Alert on high error rate from the Go app
        - alert: HighErrorRate
          expr: rate(http_requests_total{status="Internal Server Error"}[5m]) > 0.05
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "High error rate on {{ $labels.path }}"
            description: "More than 5% of requests to {{ $labels.path }} are failing."

        # Alert on high response latency
        - alert: SlowResponseTime
          expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Slow response time on {{ $labels.path }}"
            description: "95th percentile response time is over 1 second."
