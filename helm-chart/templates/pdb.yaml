{{- if and .Values.pdb.enabled (not .Values.canary.enabled) }}
{{- $appName := .Values.appName | default .Release.Name }}
{{- $track := .Values.track | default "stable" }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-pdb
  labels:
    app: {{ $appName }}
    track: {{ $track }}
spec:
  # At least minAvailable pods must remain running during voluntary disruptions
  # (e.g. kubectl drain, node upgrades). Kubernetes will block the disruption
  # if it would drop below this number.
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      app: {{ $appName }}
      track: {{ $track }}
{{- end }}
