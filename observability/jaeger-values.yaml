# Values for Jaeger Helm chart
# Install: helm install jaeger jaegertracing/jaeger -n monitoring -f observability/jaeger-values.yaml

provisionDataStore:
  cassandra: false
  elasticsearch: false
  kafka: false

storage:
  type: memory   # Use memory for dev; switch to elasticsearch for production

allInOne:
  enabled: true
  image:
    tag: "1.53.0"

collector:
  enabled: false

query:
  enabled: false

agent:
  enabled: false

ingress:
  enabled: false
