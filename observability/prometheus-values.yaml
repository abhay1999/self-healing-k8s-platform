# Values for kube-prometheus-stack Helm chart
# Install: helm install prometheus prometheus-community/kube-prometheus-stack -n monitoring -f observability/prometheus-values.yaml

grafana:
  enabled: true
  adminPassword: "admin123"   # Change this!
  service:
    type: ClusterIP

prometheus:
  prometheusSpec:
    # Scrape all pods with prometheus.io/scrape=true annotation
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false

    additionalScrapeConfigs:
      - job_name: "self-healing-app"
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

alertmanager:
  enabled: true
  config:
    route:
      group_by: ["alertname"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h
      receiver: "default"
    receivers:
      - name: "default"
        # Add Slack/email webhook here for real alerts
        # slack_configs:
        #   - api_url: "https://hooks.slack.com/services/..."
        #     channel: "#alerts"
